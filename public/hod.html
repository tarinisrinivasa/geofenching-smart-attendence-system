<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Analytics Console</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Motion.dev and LottieFiles -->
    <script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="animations.js" defer></script>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="container" style="max-width: 650px; padding: 2rem;">
        <div class="top-bar">
            <div>
                <h3>HOD Control Center</h3>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Head of Department Analytics</p>
            </div>
            <button class="logout-btn" onclick="logout(event)">Logout</button>
        </div>

        <!-- AI Metrics Cards -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 2rem;">
            <div class="card" style="margin: 0; text-align: center; background: rgba(124, 58, 237, 0.04); border-color: rgba(124, 58, 237, 0.15);">
                <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--secondary); letter-spacing: 0.05em;">AI Alerts Triggered</span>
                <h2 id="totalAlerts" style="font-size: 2.2rem; margin: 0.5rem 0 0 0; background: none; -webkit-text-fill-color: initial; color: var(--text-main);">0</h2>
            </div>
            <div class="card" style="margin: 0; text-align: center; background: rgba(239, 68, 68, 0.04); border-color: rgba(239, 68, 68, 0.15);">
                <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--error); letter-spacing: 0.05em;">Unread Flagged Cases</span>
                <h2 id="unreadAlerts" style="font-size: 2.2rem; margin: 0.5rem 0 0 0; background: none; -webkit-text-fill-color: initial; color: var(--error);">0</h2>
            </div>
        </div>

        <!-- HOD Operations Panel -->
        <div style="display: flex; gap: 12px; margin-bottom: 2rem;">
            <button class="btn" onclick="window.print()" style="flex: 1; background-color: var(--primary); box-shadow: 0 4px 12px var(--primary-glow);">
                Print / Save PDF Report
            </button>
            <button class="btn" onclick="fetchAlerts()" style="flex: 1; background-color: #0f172a; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);">
                Refresh Analysis
            </button>
        </div>

        <h3>AI Attendance Anomalies</h3>
        <div id="alertsList" style="margin-top: 1rem;">
            <div style="text-align: center; color: var(--text-muted); padding: 2rem;">Analyzing logs...</div>
        </div>
    </div>

    <script>
        // Create Magnetic Cursor Glow element
        const glow = document.createElement('div');
        glow.className = 'cursor-glow';
        document.body.appendChild(glow);
        document.addEventListener('mousemove', (e) => {
            glow.style.left = `${e.clientX}px`;
            glow.style.top = `${e.clientY}px`;
        });

        const urlParams = new URLSearchParams(window.location.search);
        const safeStorage = {
            getItem(key) {
                let val = null;
                try { val = localStorage.getItem(key); } catch(e) {}
                if (!val) {
                    try { val = sessionStorage.getItem(key); } catch(e) {}
                }
                if (!val && urlParams.has(key)) {
                    val = urlParams.get(key);
                    // Cache it if possible
                    try { localStorage.setItem(key, val); } catch(e) {
                        try { sessionStorage.setItem(key, val); } catch(err) {}
                    }
                }
                return val;
            },
            removeItem(key) {
                try { localStorage.removeItem(key); } catch(e) {}
                try { sessionStorage.removeItem(key); } catch(e) {}
            }
        };

        const user = JSON.parse(safeStorage.getItem('user'));
        const token = safeStorage.getItem('token');
        
        if (!user || !token || user.role !== 'hod') {
            window.location.href = 'index.html';
        }

        // Global Ripple Effect
        document.addEventListener('click', function (e) {
            const btn = e.target.closest('.btn') || e.target.closest('.logout-btn');
            if (btn) {
                const circle = document.createElement('span');
                const diameter = Math.max(btn.clientWidth, btn.clientHeight);
                const radius = diameter / 2;
                
                circle.style.width = circle.style.height = `${diameter}px`;
                circle.style.left = `${e.clientX - btn.getBoundingClientRect().left - radius}px`;
                circle.style.top = `${e.clientY - btn.getBoundingClientRect().top - radius}px`;
                circle.classList.add('ripple');
                
                const existing = btn.querySelector('.ripple');
                if (existing) {
                    existing.remove();
                }
                
                btn.appendChild(circle);
                circle.addEventListener('animationend', () => circle.remove());
            }
        });

        function logout(e) {
            e.preventDefault();
            setTimeout(() => {
                safeStorage.removeItem('user');
                safeStorage.removeItem('token');
                window.location.href = 'index.html';
            }, 300);
        }

        async function fetchAlerts() {
            try {
                const res = await fetch('/api/alerts', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401 || res.status === 403) return logout(new Event('logout'));
                
                const data = await res.json();
                const list = document.getElementById('alertsList');
                list.innerHTML = '';

                let total = data.alerts.length;
                let unread = data.alerts.filter(a => a.status === 0).length;

                document.getElementById('totalAlerts').innerText = total;
                document.getElementById('unreadAlerts').innerText = unread;

                if (total === 0) {
                    list.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 2.5rem; font-size: 0.95rem;">No bunking anomalies detected by the AI. All student attendance is normal.</div>';
                    return;
                }

                data.alerts.forEach((alert, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    let actionHtml = '';
                    let statusLabel = '';
                    let borderCol = 'rgba(255,255,255,0.08)';
                    let bgCol = 'rgba(255,255,255,0.02)';

                    const timeStr = new Date(alert.timestamp.replace(' ', 'T') + 'Z').toLocaleString();

                    if (alert.status === 0) {
                        borderCol = 'rgba(244, 63, 94, 0.3)';
                        bgCol = 'rgba(244, 63, 94, 0.02)';
                        statusLabel = `<span style="color:var(--error); font-size:0.75rem; font-weight:700;">⚠️ UNRESOLVED BUNK</span>`;
                        actionHtml = `
                            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:0.75rem;">
                                <button class="btn" style="width: auto; padding: 6px 12px; font-size: 0.75rem; background: var(--secondary);" onclick="notifyParent(${alert.id})">📲 Notify Parent</button>
                                <button class="btn" style="width: auto; padding: 6px 12px; font-size: 0.75rem; background: var(--primary);" onclick="reverseAttendance(${alert.id})">🔄 Reverse Attendance</button>
                                <button class="btn" style="width: auto; padding: 6px 12px; font-size: 0.75rem; background: #374151;" onclick="dismissAlert(${alert.id})">Dismiss</button>
                            </div>
                        `;
                    } else if (alert.status === 1) {
                        borderCol = 'rgba(245, 158, 11, 0.3)';
                        bgCol = 'rgba(245, 158, 11, 0.02)';
                        statusLabel = `<span style="color:#f59e0b; font-size:0.75rem; font-weight:700;">📲 PARENT NOTIFIED</span>`;
                        actionHtml = `
                            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:0.75rem;">
                                <button class="btn" style="width: auto; padding: 6px 12px; font-size: 0.75rem; background: var(--primary);" onclick="reverseAttendance(${alert.id})">🔄 Reverse Attendance</button>
                                <button class="btn" style="width: auto; padding: 6px 12px; font-size: 0.75rem; background: #374151;" onclick="dismissAlert(${alert.id})">Dismiss</button>
                            </div>
                        `;
                    } else {
                        statusLabel = `<span style="color:var(--success); font-size:0.75rem; font-weight:700;">✅ RESOLVED / ACKNOWLEDGED</span>`;
                        actionHtml = `<span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-top:0.5rem; display:block;">Action Completed</span>`;
                    }

                    card.style.borderColor = borderCol;
                    card.style.background = bgCol;

                    const parentPhoneVal = alert.parent_phone || 'Unregistered';
                    card.innerHTML = `
                        <div style="display: flex; flex-direction: column; gap: 6px;">
                            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                                ${statusLabel}
                                <small style="color:var(--text-muted); font-size:0.75rem;">Parent: <strong style="color:var(--text-main); font-family:monospace;">${parentPhoneVal}</strong></small>
                            </div>
                            <p style="font-size: 0.95rem; font-weight: 500; line-height: 1.4; color: var(--text-main); margin-top:0.25rem;">${alert.message}</p>
                            <small style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500; margin-top: 4px;">Detected on: ${timeStr}</small>
                            ${actionHtml}
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('alertsList').innerHTML = '<div style="text-align: center; color: var(--error); padding: 2rem;">Error connecting to the server.</div>';
            }
        }

        async function dismissAlert(alertId) {
            try {
                const res = await fetch(`/api/alerts/${alertId}/read`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    fetchAlerts();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function notifyParent(alertId) {
            try {
                const res = await fetch(`/api/alerts/${alertId}/notify-parent`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    alert(`📤 Parent Alert Sent!\n\nTo: ${data.parent_phone}\nMessage:\n"${data.sms_body}"`);
                    fetchAlerts();
                } else {
                    alert(`❌ Notification error: ${data.message}`);
                }
            } catch (err) {
                console.error(err);
                alert('❌ Server connection error.');
            }
        }

        async function reverseAttendance(alertId) {
            if (!confirm("Are you sure you want to reverse the attendance from Absent to Present for this student?")) return;
            try {
                const res = await fetch(`/api/alerts/${alertId}/reverse-attendance`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    alert(`✅ Reversal Successful!\n\n${data.message}`);
                    fetchAlerts();
                } else {
                    alert(`❌ Reversal error: ${data.message}`);
                }
            } catch (err) {
                console.error(err);
                alert('❌ Server connection error.');
            }
        }

        // Auto-refresh alerts every 5 seconds
        fetchAlerts();
        setInterval(fetchAlerts, 5000);
    </script>
</body>
</html>
