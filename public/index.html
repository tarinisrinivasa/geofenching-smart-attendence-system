<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Attendance Login</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <script src="animations.js?v=2" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                    registration.unregister().then(success => {
                        if (success) {
                            console.log('PWA Service Worker unregistered successfully.');
                            // Purge any local caches
                            if ('caches' in window) {
                                caches.keys().then(names => {
                                    for (let name of names) caches.delete(name);
                                });
                            }
                        }
                    });
                }
            });
        }
    </script>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="container">
        <h2>Welcome Back 👋</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="teacher or student" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="pass" required autocomplete="current-password">
            </div>
            <div style="display: flex; justify-content: center; margin-top: 2.25rem;">
                <button type="submit" class="btn" id="loginBtn" style="max-width: 250px;">
                    <span class="btn-text">Login</span>
                    <div class="spinner"></div>
                </button>
            </div>
            <div id="msg" class="message"></div>
        </form>
    </div>

    <script>
        // Global Ripple Effect for Buttons
        document.addEventListener('click', function (e) {
            const btn = e.target.closest('.btn');
            if (btn) {
                const circle = document.createElement('span');
                const diameter = Math.max(btn.clientWidth, btn.clientHeight);
                const radius = diameter / 2;
                
                circle.style.width = circle.style.height = `${diameter}px`;
                circle.style.left = `${e.clientX - btn.getBoundingClientRect().left - radius}px`;
                circle.style.top = `${e.clientY - btn.getBoundingClientRect().top - radius}px`;
                circle.classList.add('ripple');
                
                const existing = btn.querySelector('.ripple');
                if (existing) {
                    existing.remove();
                }
                
                btn.appendChild(circle);
                circle.addEventListener('animationend', () => circle.remove());
            }
        });

        // Create Magnetic Cursor Glow element
        const glow = document.createElement('div');
        glow.className = 'cursor-glow';
        document.body.appendChild(glow);
        document.addEventListener('mousemove', (e) => {
            glow.style.left = `${e.clientX}px`;
            glow.style.top = `${e.clientY}px`;
        });

        const safeStorage = {
            getItem(key) {
                try { return localStorage.getItem(key); } catch(e) { 
                    try { return sessionStorage.getItem(key) || null; } catch(err) { return null; }
                }
            },
            setItem(key, value) {
                try { localStorage.setItem(key, value); } catch(e) { 
                    try { sessionStorage.setItem(key, value); } catch(err) {}
                }
            }
        };

        let deviceId = '';
        try {
            deviceId = safeStorage.getItem('device_id');
            if (!deviceId) {
                deviceId = 'dev-' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                safeStorage.setItem('device_id', deviceId);
            }
        } catch (e) {
            deviceId = 'dev-fallback-' + Math.random().toString(36).substring(2, 15);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');
            btn.classList.add('loading');
            msg.className = 'message';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, device_id: deviceId })
                });
                const data = await res.json();
                
                if (data.success) {
                    safeStorage.setItem('user', JSON.stringify(data.user));
                    safeStorage.setItem('token', data.token); // Store secure JWT session token
                    msg.classList.add('success');
                    msg.innerText = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        let targetPage = '';
                        if (data.user.role === 'hod') {
                            targetPage = 'hod.html';
                        } else if (data.user.role === 'coordinator') {
                            targetPage = 'coordinator.html';
                        } else {
                            targetPage = data.user.role === 'teacher' ? 'teacher.html' : 'student.html';
                        }
                        
                        // Check if localStorage works, otherwise append credentials to URL for legacy Safari
                        try {
                            localStorage.setItem('__test', '1');
                            localStorage.removeItem('__test');
                            window.location.href = targetPage;
                        } catch(e) {
                            window.location.href = `${targetPage}?token=${encodeURIComponent(data.token)}&user=${encodeURIComponent(JSON.stringify(data.user))}`;
                        }
                    }, 600);
                } else {
                    msg.classList.add('error');
                    msg.innerText = data.message;
                }
            } catch (err) {
                msg.classList.add('error');
                msg.innerText = 'Server error. Please try again.';
            } finally {
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
