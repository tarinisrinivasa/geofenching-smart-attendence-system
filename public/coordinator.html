<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Coordinator Dashboard | Geofencing Attendance</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.js"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --error: #f43f5e;
            --error-glow: rgba(244, 63, 94, 0.4);
        }
        .container {
            max-width: 1000px;
        }
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 1rem;
        }
        .roster-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .roster-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 8px 30px var(--primary-glow);
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .toggle-switch input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }
        .maps-btn {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .maps-btn:hover {
            background: #3b82f6;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container" style="opacity: 0;">
        <div class="top-bar">
            <div>
                <h2 style="margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em;">
                    💼 <span style="background: linear-gradient(135deg, #a78bfa, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Coordinator</span> Console
                </h2>
                <p id="coordinatorDetails" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; font-weight: 600;"></p>
            </div>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>

        <!-- Section 1: Class Roster & Telemetry -->
        <div class="card" style="margin-bottom: 2rem;">
            <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
                👥 Roster & Real-Time Tracking
            </h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">
                Exempt students using keypad/non-smart phones from biometric locks and geofence tracking, or execute manual overrides below.
            </p>
            <div id="rosterList" class="roster-grid">
                <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 2rem;">Loading class roster...</div>
            </div>
        </div>

        <!-- Section 2: Temporary Out-Of-Campus Passes -->
        <div class="card" style="margin-bottom: 2rem;">
            <h3 style="margin-top: 0;">🎫 Issue Out-of-Campus Exit Pass</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1rem;">
                <div>
                    <label style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;">Select Student</label>
                    <select id="passStudentSelect" style="width: 100%; height: 42px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--surface-border); color: #fff; padding: 0 12px; font-family: inherit;">
                        <option value="">-- Choose Student --</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;">Reason</label>
                    <input type="text" id="passReasonInput" placeholder="e.g. Canteen / Clinic / Scholarship" style="width: 100%; height: 42px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--surface-border); color: #fff; padding: 0 12px; font-family: inherit;">
                </div>
                <div>
                    <label style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;">Duration (Minutes)</label>
                    <select id="passDurationSelect" style="width: 100%; height: 42px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--surface-border); color: #fff; padding: 0 12px; font-family: inherit;">
                        <option value="15">15 Minutes</option>
                        <option value="30">30 Minutes</option>
                        <option value="45">45 Minutes</option>
                        <option value="60">60 Minutes</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                <button class="btn" style="width: auto; padding: 0 20px; height: 38px; font-size: 0.8rem; background: var(--primary);" onclick="grantStudentPass()">Grant Temporary Exit Pass</button>
                <span id="passGrantStatus" style="font-size: 0.85rem; font-weight: 700; color: var(--primary);"></span>
            </div>
        </div>

        <!-- Section 3: Class Geofence Anomalies Feed -->
        <h3 style="margin-top: 1.5rem;">🚨 Geofence Anomalies & Breaches</h3>
        <div id="alertsList" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 12px;">
            <div style="text-align: center; color: var(--text-muted); padding: 2rem; background: rgba(255,255,255,0.02); border-radius:16px;">Analyzing logs...</div>
        </div>
    </div>

    <script>
        // Create Magnetic Cursor Glow
        const glow = document.createElement('div');
        glow.className = 'cursor-glow';
        document.body.appendChild(glow);
        document.addEventListener('mousemove', (e) => {
            glow.style.left = `${e.clientX}px`;
            glow.style.top = `${e.clientY}px`;
        });

        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user'));

        if (!token || !user || user.role !== 'coordinator') {
            window.location.href = 'index.html';
        }

        document.getElementById('coordinatorDetails').innerText = `Coordinator Account: ${user.username} | Class ID: ${user.coordinator_class_id || 'N/A'}`;

        // Stagger fade-in animations on load
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.querySelector('.container');
            if (typeof Motion !== 'undefined') {
                Motion.animate(container, { opacity: [0, 1], y: [15, 0] }, { duration: 0.5, ease: [0.16, 1, 0.3, 1] });
            } else {
                container.style.opacity = '1';
            }
        });

        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        async function fetchRoster() {
            try {
                const res = await fetch('/api/coordinator/roster', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.roster) {
                    const list = document.getElementById('rosterList');
                    const select = document.getElementById('passStudentSelect');
                    list.innerHTML = '';
                    select.innerHTML = '<option value="">-- Choose Student --</option>';

                    data.roster.forEach(student => {
                        // Populate select options
                        const opt = document.createElement('option');
                        opt.value = student.id;
                        opt.innerText = `${student.username} (${student.barcode})`;
                        select.appendChild(opt);

                        // Create grid card
                        const card = document.createElement('div');
                        card.className = 'roster-card';

                        let statusColor = 'var(--text-muted)';
                        if (student.status.includes('Guarded')) statusColor = 'var(--success)';
                        else if (student.status.includes('Breach')) statusColor = 'var(--error)';
                        else if (student.status.includes('Offline')) statusColor = '#f59e0b';

                        card.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div>
                                    <h4 style="margin: 0; font-size: 1.05rem; font-weight: 600;">${student.username}</h4>
                                    <span style="font-size: 0.75rem; color: var(--text-muted);">Barcode: ${student.barcode}</span>
                                </div>
                                <span style="font-size: 0.75rem; font-weight: 700; color: ${statusColor};">${student.status}</span>
                            </div>
                            
                            <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; display: flex; justify-content: space-between; align-items: center;">
                                <label class="toggle-switch">
                                    <input type="checkbox" ${student.is_keypad === 1 ? 'checked' : ''} onchange="toggleKeypad(${student.id}, this.checked)">
                                    Keypad Phone
                                </label>
                                <button class="btn" style="height: 28px; padding: 0 10px; font-size: 0.7rem; width: auto; border-radius: 8px; background: rgba(255,255,255,0.05);" onclick="manualCheckIn(${student.id})">
                                    Manual Checkin
                                </button>
                            </div>
                        `;
                        list.appendChild(card);
                    });
                }
            } catch (err) {
                console.error("Failed to load class roster:", err);
            }
        }

        async function toggleKeypad(studentId, isKeypad) {
            try {
                const res = await fetch('/api/coordinator/toggle-keypad', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ student_id: studentId, is_keypad: isKeypad })
                });
                const data = await res.json();
                if (data.success) {
                    fetchRoster();
                }
            } catch (err) {
                console.error("Failed to update keypad status:", err);
            }
        }

        async function manualCheckIn(studentId) {
            try {
                const res = await fetch('/api/coordinator/manual-checkin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ student_id: studentId, class_id: user.coordinator_class_id || 1 })
                });
                const data = await res.json();
                alert(data.message);
                fetchRoster();
            } catch (err) {
                console.error("Manual check-in failed:", err);
            }
        }

        async function fetchAlerts() {
            try {
                const res = await fetch('/api/coordinator/class-feed', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.alerts) {
                    const list = document.getElementById('alertsList');
                    list.innerHTML = '';

                    if (data.alerts.length === 0) {
                        list.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 2rem;">No active anomalies detected in this section.</div>';
                        return;
                    }

                    data.alerts.forEach(alertItem => {
                        const div = document.createElement('div');
                        div.style.background = 'rgba(255,255,255,0.02)';
                        div.style.border = '1px solid var(--surface-border)';
                        div.style.borderRadius = '16px';
                        div.style.padding = '16px';
                        div.style.display = 'flex';
                        div.style.flexDirection = 'column';
                        div.style.gap = '12px';

                        if (alertItem.status === 0) {
                            div.style.borderColor = 'rgba(244, 63, 94, 0.2)';
                            div.style.background = 'rgba(244, 63, 94, 0.01)';
                        }

                        // Google Maps tracing link if coordinates exist
                        let locationTrace = '';
                        if (alertItem.latitude && alertItem.longitude) {
                            locationTrace = `
                                <a href="https://www.google.com/maps?q=${alertItem.latitude},${alertItem.longitude}" target="_blank" class="maps-btn">
                                    📍 Live Location Trace
                                </a>
                            `;
                        }

                        div.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px;">
                                <div>
                                    <span style="font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: var(--error); letter-spacing: 0.05em;">${alertItem.status === 0 ? '🔴 Active Anomaly' : '✅ Resolved'}</span>
                                    <p style="margin: 4px 0 0 0; font-size: 0.9rem; line-height: 1.4;">${alertItem.message}</p>
                                </div>
                                <div style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700;">
                                    ${new Date(alertItem.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                </div>
                            </div>
                            
                            ${alertItem.student_reason ? `
                                <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--surface-border); border-radius: 8px; padding: 10px; font-size: 0.8rem;">
                                    <span style="font-weight: 700; color: var(--primary);">📝 Student's Excuse Statement:</span>
                                    <p style="margin: 4px 0 0 0; font-style: italic; color: var(--text-muted);">${alertItem.student_reason}</p>
                                </div>
                            ` : ''}
                            
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                                <div>
                                    ${locationTrace}
                                </div>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn" style="height: 32px; padding: 0 12px; font-size: 0.75rem; width: auto; background: var(--success);" onclick="reverseAttendance(${alertItem.id})">Reverse Status</button>
                                    <button class="btn" style="height: 32px; padding: 0 12px; font-size: 0.75rem; width: auto; background: var(--primary);" onclick="notifyParent(${alertItem.id})">Notify Parent</button>
                                </div>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                }
            } catch (err) {
                console.error("Failed to load anomalies feed:", err);
            }
        }

        async function notifyParent(alertId) {
            if (!confirm("Notify parent immediately about this geofence anomaly?")) return;
            try {
                const res = await fetch(`/api/alerts/${alertId}/notify-parent`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                alert(data.message);
                fetchAlerts();
            } catch (err) {
                console.error(err);
            }
        }

        async function reverseAttendance(alertId) {
            if (!confirm("Confirm action: Reverse student's check-in status from Absent to Present?")) return;
            try {
                const res = await fetch(`/api/alerts/${alertId}/reverse-attendance`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                alert(data.message);
                fetchAlerts();
                fetchRoster();
            } catch (err) {
                console.error(err);
            }
        }

        async function grantStudentPass() {
            const studentId = document.getElementById('passStudentSelect').value;
            const reason = document.getElementById('passReasonInput').value.trim();
            const duration = document.getElementById('passDurationSelect').value;
            const statusLabel = document.getElementById('passGrantStatus');

            if (!studentId || !reason) {
                statusLabel.style.color = 'var(--error)';
                statusLabel.innerText = "❌ Select student and enter reason.";
                return;
            }

            statusLabel.style.color = 'var(--text-muted)';
            statusLabel.innerText = "Issuing pass...";

            try {
                const res = await fetch('/api/hod/grant-pass', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ student_id: studentId, reason, duration_mins: duration })
                });
                const data = await res.json();
                if (data.success) {
                    statusLabel.style.color = 'var(--success)';
                    statusLabel.innerText = "✅ Pass Granted!";
                    document.getElementById('passReasonInput').value = '';
                    setTimeout(() => { statusLabel.innerText = ''; }, 3000);
                    fetchRoster();
                } else {
                    statusLabel.style.color = 'var(--error)';
                    statusLabel.innerText = `❌ ${data.message}`;
                }
            } catch (err) {
                statusLabel.style.color = 'var(--error)';
                statusLabel.innerText = "❌ Server communication error.";
            }
        }

        // Initialize feeds
        fetchRoster();
        fetchAlerts();

        // Stagger intervals
        setInterval(fetchRoster, 5000);
        setInterval(fetchAlerts, 5000);
    </script>
</body>
</html>
